---
- name: "[VULN] ad_asrep_roasting — Disable pre-auth on a user"
  ansible.windows.win_shell: |
    $pw = ConvertTo-SecureString "Welcome123!" -AsPlainText -Force
    New-ADUser -Name "jdoe" -SamAccountName "jdoe" -AccountPassword $pw `
      -Enabled $true -Description "John Doe"
    Set-ADAccountControl -Identity jdoe -DoesNotRequirePreAuth $true
  when: "'dc-primary' in vm_role"
  ignore_errors: true
