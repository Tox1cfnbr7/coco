---
# webserver_sqli.yml — Activate SQL injection in login form
- name: "[VULN] webserver_sqli — Enable SQLi in login form"
  ansible.builtin.lineinfile:
    path: /var/www/html/login.php
    regexp: ".*prepared.*statement.*"
    line: "// VULN: raw query (no prepared statement)"
    backrefs: yes
  when: "'web' in vm_role"
  ignore_errors: true

- name: "[VULN] webserver_sqli — Patch login.php to use raw query"
  ansible.builtin.replace:
    path: /var/www/html/login.php
    regexp: '\$stmt\s*=\s*\$pdo->prepare\(.*\)'
    replace: '$result = $pdo->query("SELECT * FROM users WHERE username=\'" . $_POST[\'username\'] . "\' AND password=\'" . md5($_POST[\'password\']) . "\'")'
  when: "'web' in vm_role"
  ignore_errors: true
