---
- name: "[VULN] win_weak_gpo — Make Domain Users writeable to a GPO"
  ansible.windows.win_shell: |
    Import-Module GroupPolicy
    $gpo = New-GPO -Name "CorpPolicy-Vuln" -Comment "Vulnerable GPO for training"
    $acl = Get-Acl "AD:CN={$($gpo.Id)},CN=Policies,CN=System,DC=corp,DC=coco,DC=local"
    $sid = New-Object System.Security.Principal.SecurityIdentifier("S-1-5-21-Domain-513")
    $ace = New-Object System.DirectoryServices.ActiveDirectoryAccessRule($sid, "WriteProperty", "Allow")
    $acl.AddAccessRule($ace)
    Set-Acl -AclObject $acl
  when: "'dc-primary' in vm_role"
  ignore_errors: true
