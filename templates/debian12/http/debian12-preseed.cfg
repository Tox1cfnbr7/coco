# Debian 12 Preseed — unattended install
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string debian12
d-i netcfg/get_domain string coco.local
d-i netcfg/wireless_wep string

d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

d-i passwd/root-login boolean true
d-i passwd/root-password password coco2024
d-i passwd/root-password-again password coco2024
d-i passwd/make-user boolean false

tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server curl wget git python3 sudo
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# Allow root SSH login with a password BEFORE the first boot.
# Debian's default sshd_config ships with "PermitRootLogin prohibit-password",
# which blocks Packer's SSH provisioner step entirely (Packer needs SSH to run
# any provisioner, so this can't be fixed by a later shell provisioner —
# that's a chicken-and-egg problem). late_command runs inside the installed
# target filesystem (chrooted via in-target) right before reboot.
d-i preseed/late_command string \
    in-target sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
    in-target sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config; \
    in-target systemctl enable ssh

d-i finish-install/reboot_in_progress note
