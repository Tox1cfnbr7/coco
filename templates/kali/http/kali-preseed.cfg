# Kali Linux Preseed — fully unattended install for Packer/Proxmox
# Password: coco2024

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string kali
d-i netcfg/get_domain string coco.local

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string

# Clock
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Disk — use entire disk, no LVM
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Root password
d-i passwd/root-login boolean true
d-i passwd/root-password password coco2024
d-i passwd/root-password-again password coco2024
d-i passwd/make-user boolean false

# Base system
d-i base-installer/kernel/override-image string linux-image-amd64

# Packages — minimal base; SSH installed here, desktop + tools added in
# late_command below (Kali's desktop metapackages are unreliable via
# pkgsel/include during the base install — the Kali repo/keyring isn't fully
# usable yet at that stage, so we pull the desktop in late_command instead,
# which runs after the base system + apt sources are fully set up).
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server curl wget git python3 python3-pip
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# Grub
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# Post-install: enable root SSH login with a password, then install the
# Kali XFCE desktop + core tools. This must happen here (late_command,
# chrooted via in-target) — not in a Packer shell provisioner — because
# Packer's SSH provisioner needs working SSH+password-auth before it can
# connect at all, and the desktop has to exist before the VM's first regular
# boot or there's no graphical session to log into.
# NOTE: this makes the unattended install noticeably longer (the desktop +
# tool metapackages are several GB). kali-linux-headless (not -default) is
# used to keep the tool set reasonable; the desktop is what "default" mainly
# adds on top, and kali-desktop-xfce already brings that in explicitly.
d-i preseed/late_command string \
    in-target sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
    in-target sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config; \
    in-target systemctl enable ssh; \
    in-target sh -c 'echo "deb http://http.kali.org/kali kali-rolling main contrib non-free non-free-firmware" > /etc/apt/sources.list'; \
    in-target apt-get update; \
    in-target env DEBIAN_FRONTEND=noninteractive apt-get install -y kali-desktop-xfce kali-linux-headless xfce4 lightdm network-manager; \
    in-target systemctl enable lightdm; \
    in-target systemctl enable NetworkManager; \
    in-target systemctl set-default graphical.target

# Finish
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean false
